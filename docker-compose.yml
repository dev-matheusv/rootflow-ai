services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rootflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rootflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rootflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rootflow"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  rootflow-postgres-data:
